<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Notification App – Design System</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar__left">
        <span class="top-bar__app-name">Job Tracker</span>
      </div>
      <div class="top-bar__center">
        <nav class="main-nav" aria-label="Primary">
          <div class="main-nav__menu" id="main-nav-menu">
            <a href="/dashboard" data-route="/dashboard" class="main-nav__link">Dashboard</a>
            <a href="/saved" data-route="/saved" class="main-nav__link">Saved</a>
            <a href="/digest" data-route="/digest" class="main-nav__link">Digest</a>
            <a href="/settings" data-route="/settings" class="main-nav__link">Preferences</a>
          </div>
        </nav>
      </div>
      <div class="top-bar__right">
        <span class="badge badge--status badge--status-active">Live</span>
      </div>
    </header>

    <!-- Context Header -->
    <section class="context-header">
      <div class="context-header__content">
        <h1 class="heading-xl" id="context-title">Precision Discovery</h1>
        <p class="body-md">
          <span id="context-subtitle">
            The premium gateway to India's most relevant tech roles.
          </span>
        </p>
      </div>
    </section>

    <!-- Main Layout -->
    <main class="layout">
      <!-- Primary Workspace (Full width for simplicity as requested "clean rendering") -->
      <section class="layout__primary" style="grid-column: span 2;">
        <div class="route-outlet" id="route-outlet" aria-live="polite"></div>
      </section>
    </main>

    <!-- Proof Footer -->
    <footer class="proof-footer">
      <div class="proof-footer__checklist">
        <label class="check-item body-sm">
          <input type="checkbox" disabled />
          <span>UI Built</span>
        </label>
        <label class="check-item body-sm">
          <input type="checkbox" disabled />
          <span>Logic Working</span>
        </label>
        <label class="check-item body-sm">
          <input type="checkbox" disabled />
          <span>Test Passed</span>
        </label>
        <label class="check-item body-sm">
          <input type="checkbox" disabled />
          <span>Deployed</span>
        </label>
      </div>
    </footer>
  </div>
  <script src="app.js"></script>
</body>

</html>
